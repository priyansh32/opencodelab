worker_processes 1;

events { worker_connections 1024; }

http {
  sendfile on;
  resolver 127.0.0.11 valid=10s;
  map $http_origin $cors_origin {
    default "";
    "~^http://localhost(:3000|:4173|:5173)?$" $http_origin;
  }

  upstream client_servers {
    server client:4173;
  }

  upstream app_servers {
    server app-server:3000;
  }

  upstream polling_servers {
    server polling-server:8080;
  }

  server {
    listen 80;
    add_header "Access-Control-Allow-Origin" "$cors_origin" always;
    add_header "Access-Control-Allow-Methods" "GET, POST, OPTIONS" always;
    add_header "Access-Control-Allow-Headers" "Authorization, Origin, X-Requested-With, Content-Type, Accept, accept-version" always;
    add_header "Access-Control-Allow-Credentials" "true" always;
    add_header "Vary" "Origin" always;
    add_header "Access-Control-Max-Age" "86400" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location /consumer {
      proxy_pass http://polling_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering off;
    }

    location = /producer {
      proxy_pass http://app_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /test-client {
      proxy_pass http://app_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    location /api {
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass http://app_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
    
    location / {
      proxy_pass http://client_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

  }
}
